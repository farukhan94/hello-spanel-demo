name: Deploy to SPanel via SSH

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SSH tools
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Deploy files to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no -p $SSH_PORT $SSH_USER@$SSH_HOST << 'EOF'

            echo "Connected to server"

            cd /home/testbasicselfcom/t1.test.basicself.com || exit

            echo "Current directory: $(pwd)"
            echo "Pulling latest code..."

            # Initialize git repo if it doesn't exist, then pull
            if [ ! -d ".git" ]; then
              git init
              git remote add origin https://github.com/farukhan94/hello-spanel-demo.git
            fi

            git fetch origin main
            git reset --hard origin/main

            echo "Deployment complete"
            ls -la

          EOF